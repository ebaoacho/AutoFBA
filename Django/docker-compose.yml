version: "3.8"

services:
  logex_django:
    build:
      context: .
    ports:
      - "8000:8000"
    volumes:
      - .:/Django
    depends_on:
      - logex_db
    command: ["./wait-for-it.sh", "logex_db:5432", "--", "python", "manage.py", "runserver", "0.0.0.0:8000"]

  logex_db:
    image: postgres:latest
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword